name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Simulator unit tests
        run: python -m unittest discover -s simulator/tests -t .

      # coming as the phases land: lint, dbt build against DuckDB, autopilot tests
